<!-- userviewfeedback.component.html -->

<div class="feedback-list-container">
  <h2>My Feedbacks</h2>
  
  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>
  
  <ul *ngIf="feedbacks.length > 0">
    <li *ngFor="let feedback of feedbacks">
      <div class="feedback-item">
        <p>{{ feedback.FeedbackText }}</p>
        <button (click)="confirmDelete(feedback)" class="delete-button">Delete</button>
      </div>
    </li>
  </ul>
  
  <!-- Delete Confirmation Modal -->
  <div *ngIf="showDeleteModal" class="overlay">
    <div class="modal">
      <h3>Confirm Deletion</h3>
      <p>Are you sure you want to delete this feedback?</p>
      <button (click)="deleteFeedback()" class="confirm-button">Yes</button>
      <button (click)="showDeleteModal = false" class="cancel-button">No</button>
    </div>
  </div>
  
  <!-- Logout Confirmation Modal -->
  <div *ngIf="showLogoutModal" class="overlay">
    <div class="modal">
      <h3>Confirm Logout</h3>
      <p>Are you sure you want to logout?</p>
      <button (click)="confirmLogout()" class="confirm-button">Yes</button>
      <button (click)="cancelLogout()" class="cancel-button">No</button>
    </div>
  </div>
</div>
